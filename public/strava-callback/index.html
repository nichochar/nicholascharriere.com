<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Strava OAuth Callback</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #0e0e10;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }
    h1 { color: #fc4c02; margin-bottom: 8px; }
    p.sub { color: #aaa; margin-top: 0; margin-bottom: 24px; }
    .box {
      background: #1a1a1d;
      border: 1px solid #333;
      padding: 20px;
      border-radius: 12px;
      max-width: 600px;
      width: 100%;
      box-sizing: border-box;
    }
    label { display: block; color: #999; font-size: 13px; margin-bottom: 6px; }
    textarea, input {
      width: 100%;
      box-sizing: border-box;
      background: #0e0e10;
      color: #eee;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 14px;
      margin-bottom: 16px;
    }
    textarea { min-height: 80px; resize: vertical; }
    button {
      background: #fc4c02;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-right: 8px;
    }
    button:hover { background: #e04400; }
    .ok { color: #6fdd8b; font-size: 13px; margin-left: 8px; }
    .err { color: #f66; }
  </style>
</head>
<body>
  <h1>🚴 Strava linked</h1>
  <p class="sub">Copy the authorization code below and send it back to Lobstick.</p>
  <div class="box">
    <label>Authorization code</label>
    <input id="code" readonly />
    <label>Full callback URL</label>
    <textarea id="full" readonly></textarea>
    <button onclick="copy('code')">Copy code</button>
    <button onclick="copy('full')">Copy full URL</button>
    <span id="msg" class="ok"></span>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var code = params.get('code') || '';
      var err = params.get('error');
      document.getElementById('code').value = code;
      document.getElementById('full').value = location.href;
      if (err || !code) {
        document.querySelector('h1').textContent = '⚠️ Callback error';
        document.querySelector('.sub').textContent = err || 'No code in URL';
        document.querySelector('.sub').classList.add('err');
      }
    })();
    function copy(id) {
      var el = document.getElementById(id);
      el.select();
      document.execCommand('copy');
      var m = document.getElementById('msg');
      m.textContent = 'copied ✓';
      setTimeout(function () { m.textContent = ''; }, 1500);
    }
  </script>
</body>
</html>
